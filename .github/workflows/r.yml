name: R CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    # Ajustado para o seu servidor Xeon Platinum 8260
    runs-on: self-hosted
    strategy:
      matrix:
        r-version: ['4.4.1']

    steps:
      - uses: actions/checkout@v4

      # Configuração de repositórios específica para Oracle Linux 9.7
      - name: Enable EPEL and CodeReady Builder
        run: |
          sudo dnf install -y oracle-epel-release-el9
          sudo dnf config-manager --set-enabled ol9_codeready_builder
          sudo dnf config-manager --set-enabled ol9_developer_EPEL
          sudo dnf clean all
          sudo dnf makecache
          
      # Instalação de dependências de sistema para R e compilação (C/Fortran)
      - name: Install System Dependencies
        run: |
          sudo dnf install -y \
            R-core \
            R-core-devel \
            R-devel \
            libcurl-devel \
            openssl-devel \
            libxml2-devel \
            harfbuzz-devel \
            fribidi-devel \
            freetype-devel \
            libpng-devel \
            libjpeg-turbo-devel \
            openblas-devel \
            lapack-devel \
            gcc-gfortran \
            gcc-c++ \
            make

      - name: Set up R ${{ matrix.r-version }}
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::remotes
            any::tidyverse
            any::tidymodels
            any::testthat
            any::xgboost
            any::lightgbm
            any::rBayesianOptimization
            any::yardstick
            any::Matrix
            any::data.table
          needs: check

      - name: Check Package
        run: rcmdcheck::rcmdcheck(args = "--no-manual", error_on = "error")
        shell: Rscript {0}
        
